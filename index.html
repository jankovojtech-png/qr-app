<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR formulář</title>

  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="stylesheet" href="/css/app.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="public-page">

  <main class="public-layout">
    <div class="public-card">
      <h1 id="title">QR formulář</h1>
      <form id="form"></form>
      <div id="message"></div>
    </div>
  </main>

  <script type="module">
    import { client } from "/js/supabase.js";
    import { $ } from "/js/helpers.js";

    const titleEl = $("#title");
    const formEl = $("#form");
    const messageEl = $("#message");

    function showError(titleText, htmlMessage) {
      titleEl.textContent = titleText;
      formEl.innerHTML = "";
      messageEl.innerHTML = htmlMessage;
    }

    function getResponseStorageKey(codeId, versionId) {
      return `qr_response_${codeId}_${versionId}`;
    }

    function createField(field) {
      if (field.type === "info") {
        const info = document.createElement("div");
        info.className = "info-box";
        info.textContent = field.label || "";
        return info;
      }

      const wrapper = document.createElement("div");

      if (field.type === "rating") {
        wrapper.className = "form-group";

        const label = document.createElement("label");
        label.textContent = field.label || "Hodnocení";

        const stars = document.createElement("div");
        stars.className = "rating-stars";
        stars.setAttribute("role", "radiogroup");
        stars.setAttribute("aria-label", field.label || "Hodnocení");

        for (let i = 1; i <= 5; i++) {
          const input = document.createElement("input");
          input.type = "radio";
          input.id = `${field.id}-${i}`;
          input.name = field.id;
          input.value = String(i);

          const starLabel = document.createElement("label");
          starLabel.setAttribute("for", input.id);
          starLabel.textContent = "★";
          starLabel.title = `${i} z 5`;

          stars.appendChild(input);
          stars.appendChild(starLabel);
        }

        wrapper.append(label, stars);
        return wrapper;
      }

      const label = document.createElement("label");
      label.textContent = field.label || "";

      let input;

      if (field.type === "textarea") {
        input = document.createElement("textarea");
      } else {
        input = document.createElement("input");
        input.type = "text";
      }

      input.name = field.id;

      wrapper.append(label, input);
      return wrapper;
    }

    async function loadForm() {
      const code = new URLSearchParams(window.location.search).get("code");

      if (!code) {
        showError("Chybný odkaz", "<div class='error-box'>Chybí QR kód v odkazu.</div>");
        return;
      }

      const { data: codeData, error: codeError } = await client
        .from("codes")
        .select("id,title,active")
        .eq("id", code)
        .single();

      if (codeError || !codeData) {
        showError("QR nenalezen", "<div class='error-box'>Tento QR kód neexistuje.</div>");
        return;
      }

      if (codeData.active === false) {
        showError(
          codeData.title || "QR formulář",
          "<div class='error-box'>Tento QR kód není aktivní.</div>"
        );
        return;
      }

      const { data: versionData, error: versionError } = await client
        .from("code_versions")
        .select("*")
        .eq("code_id", code)
        .eq("is_active", true)
        .order("version_number", { ascending: false })
        .limit(1)
        .maybeSingle();

      if (versionError || !versionData) {
        showError("Chyba", "<div class='error-box'>Nepodařilo se načíst aktivní verzi.</div>");
        return;
      }

      const responseStorageKey = getResponseStorageKey(code, versionData.id);

      if (localStorage.getItem(responseStorageKey)) {
        showError(
          versionData.title || codeData.title || "QR formulář",
          "<div class='status show success'>Tuto odpověď už jste na tomto zařízení jednou odeslali.</div>"
        );
        return;
      }

      titleEl.textContent = versionData.title || codeData.title || "QR formulář";

      const schema = Array.isArray(versionData.schema) ? versionData.schema : [];

      if (!schema.length) {
        showError(
          titleEl.textContent,
          "<div class='error-box'>Tento QR kód nemá obsah.</div>"
        );
        return;
      }

      formEl.innerHTML = "";
      messageEl.innerHTML = "";

      schema.forEach(field => {
        formEl.appendChild(createField(field));
      });

      const isInfoOnly = schema.every(f => f.type === "info");

      if (isInfoOnly) {
        messageEl.innerHTML = "<div class='muted'>Tento QR kód zobrazuje pouze informaci.</div>";
        return;
      }

      const button = document.createElement("button");
      button.type = "submit";
      button.className = "btn primary";
      button.textContent = "Odeslat";

      formEl.appendChild(button);

      formEl.addEventListener("submit", async (e) => {
        e.preventDefault();

        const answers = {};

        schema.forEach(field => {
          if (field.type === "info") return;

          let el;

          if (field.type === "rating") {
            el = formEl.querySelector(`[name="${field.id}"]:checked`);
          } else {
            el = formEl.querySelector(`[name="${field.id}"]`);
          }

          answers[field.id] = el ? el.value : "";
        });

        if ("rating" in answers) {
          const rating = Number(answers.rating);

          if (Number.isNaN(rating) || rating < 1 || rating > 5) {
            alert("Hodnocení musí být mezi 1 a 5.");
            return;
          }

          answers.rating = String(Math.round(rating));
        }

        const { error } = await client
          .from("responses")
          .insert([
            {
              code_id: code,
              code_version_id: versionData.id,
              answers
            }
          ]);

        if (error) {
          alert("Chyba při ukládání.");
          return;
        }

        localStorage.setItem(responseStorageKey, "1");
        messageEl.innerHTML = "<div class='status show success'>Děkujeme 👍</div>";
        formEl.reset();
        formEl.innerHTML = "";
      });
    }

    loadForm();

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(console.error);
    }
  </script>

</body>
</html>
