<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Přihlášení</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial;
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:350px;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:10px;
background:#2d7ef7;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

#msg{
margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<h2>Přihlášení</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Heslo">

<button onclick="login()">Přihlásit</button>

<div id="msg"></div>

</div>

<script>

const SUPABASE_URL="https://lpawgvdrzpbxozctfzxd.supabase.co"
const SUPABASE_KEY="sb_publishable_XaWFZ5tXOrwtY43Jb7wh6g_LO76lCQZ"

const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {error}=await client.auth.signInWithPassword({
email,
password
})

if(error){
document.getElementById("msg").innerText=error.message
return
}

window.location.href="create-qr.html"

}

</script>

</body>
</html>
