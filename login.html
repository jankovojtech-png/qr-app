<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Přihlášení | QR App</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="stylesheet" href="/css/app.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <main class="login-layout">
    <div class="login-box">
      <h1>Přihlášení</h1>
      <p class="lead">Přihlášení do administrace QR App.</p>

      <div id="status" class="status"></div>

      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" placeholder="vas@email.cz">

      <label for="password">Heslo</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="Heslo">

      <button id="loginBtn" class="btn primary" type="button">Přihlásit</button>

      <div class="app-install-note">
        Po refactoru je aplikace připravená i pro mobilní testování a základní PWA režim.
      </div>
    </div>
  </main>

  <script type="module">
    import { client } from "/js/supabase.js";
    import { redirectIfLoggedIn } from "/js/auth.js";
    import { $, } from "/js/helpers.js";
    import { showStatus, clearStatus, setLoading } from "/js/ui.js";

    const emailInput = $("#email");
    const passwordInput = $("#password");
    const loginBtn = $("#loginBtn");
    const status = $("#status");

    async function login() {
      clearStatus(status);

      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        showStatus(status, "Vyplňte email i heslo.", "error");
        return;
      }

      setLoading(loginBtn, true, "Přihlašuji...", "Přihlásit");

      const { error } = await client.auth.signInWithPassword({ email, password });

      if (error) {
        showStatus(status, error.message, "error");
        setLoading(loginBtn, false, "Přihlašuji...", "Přihlásit");
        return;
      }

      window.location.href = "/admin.html";
    }

    [emailInput, passwordInput].forEach((input) => {
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") login();
      });
    });

    loginBtn.addEventListener("click", login);
    redirectIfLoggedIn();

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(console.error);
    }
  </script>
</body>
</html>
