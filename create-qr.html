<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vytvořit QR</title>

<link rel="stylesheet" href="/css/app.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="auth-guard">

<header class="topbar">
<div class="topbar-inner">

<div class="brand">QR App Admin</div>

<nav class="nav">
<a href="/admin.html">Odpovědi</a>
<a href="/my-qr.html">Moje QR</a>
<a href="/create-qr.html" class="active">Vytvořit QR</a>
<a href="/generator.html">Generátor</a>
<button id="logoutBtn">Odhlásit</button>
</nav>

</div>
</header>

<main class="page">

<h1>Vytvořit QR</h1>

<div class="card">

<label>Název QR</label>
<input id="title">

<label>Otázka</label>
<textarea id="question"></textarea>

<button id="createBtn" class="btn primary">Vytvořit QR</button>

<div id="result"></div>

</div>

</main>

<script type="module">

import { client } from "/js/supabase.js"
import { requireAuth , logout } from "/js/auth.js"
import { $ } from "/js/helpers.js"
import { renderQr } from "/js/qr.js"

const result=$("#result")

async function create(){

const user = await requireAuth()
if(!user) return

const title=$("#title").value
const question=$("#question").value

const codeId = crypto.randomUUID().slice(0,8)

const schema = [
  { id:"name", type:"text", label:"Jméno" },
  { id:"rating", type:"number", label: question || "Hodnocení (1 = nejhorší, 5 = nejlepší)" },
  { id:"note", type:"textarea", label:"Poznámka" }
];

await client.from("codes").insert({
id:codeId,
title,
schema,
owner_id:user.id,
active:true
})

await client.from("code_versions").insert({
code_id:codeId,
version_number:1,
title,
schema,
is_active:true
})

const url=window.location.origin+"/index.html?code="+codeId

result.innerHTML=`<h3>QR vytvořeno</h3><div class="qr"></div><a href="${url}">${url}</a>`

renderQr(result.querySelector(".qr"),url)

}

$("#createBtn").addEventListener("click",create)
$("#logoutBtn").addEventListener("click",logout)

</script>

</body>
</html>
