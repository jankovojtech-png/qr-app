<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR generátor</title>

<link rel="stylesheet" href="/css/app.css">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

</head>

<body>

<main class="page">

<h1>QR generátor</h1>

<input id="code" placeholder="kód QR">

<button id="generateBtn" class="btn primary">Vygenerovat</button>

<div id="result"></div>

</main>

<script>

const btn=document.getElementById("generateBtn")

btn.onclick=async()=>{

const code=document.getElementById("code").value.trim()

if(!code)return alert("Zadej kód")

const url=location.origin+"/index.html?code="+code

const box=document.getElementById("result")

box.innerHTML="<canvas></canvas><div>"+url+"</div>"

QRCode.toCanvas(box.querySelector("canvas"),url)

}

</script>

</body>
</html>
