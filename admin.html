<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – odpovědi</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f6f8;
      padding:40px;
      margin:0;
    }
    h1{
      margin-bottom:20px;
    }
    table{
      border-collapse:collapse;
      width:100%;
      background:white;
    }
    th,td{
      padding:10px;
      border-bottom:1px solid #ddd;
      text-align:left;
      vertical-align:top;
    }
    th{
      background:#f0f0f0;
    }
    tr:hover{
      background:#fafafa;
    }
    .box{
      background:white;
      padding:16px;
      margin-bottom:20px;
      border-radius:8px;
    }
  </style>
</head>
<body>

  <h1>Odpovědi z formulářů</h1>

  <div class="box" id="status">Načítám data...</div>

  <table>
    <thead>
      <tr>
        <th>QR kód</th>
        <th>Jméno</th>
        <th>Hodnocení</th>
        <th>Poznámka</th>
        <th>Čas</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <script>
    // SEM ZKOPÍRUJ PŘESNĚ STEJNÉ HODNOTY JAKO MÁŠ VE FUNKČNÍM index.html
    const SUPABASE_URL = "https://lpawgvdrzpbxozctfzxd.supabase.co";
    const SUPABASE_KEY = "sb_publishable_XaWFZ5tXOrwtY43Jb7wh6g_LO76lCQZ";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function load() {
      const status = document.getElementById("status");
      const tbody = document.getElementById("tbody");

      try {
        const { data, error } = await client
          .from("responses")
          .select("*")
          .order("created_at", { ascending: false });

        if (error) {
          status.textContent = "Chyba načtení: " + error.message;
          console.error(error);
          return;
        }

        if (!data || data.length === 0) {
          status.textContent = "Zatím žádné odpovědi.";
          return;
        }

        status.textContent = "Načteno odpovědí: " + data.length;

        data.forEach((r) => {
          const answers = r.answers || {};

          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${r.code_id || ""}</td>
            <td>${answers.name || ""}</td>
            <td>${answers.rating || ""}</td>
            <td>${answers.note || ""}</td>
            <td>${r.created_at || ""}</td>
          `;
          tbody.appendChild(row);
        });
      } catch (err) {
        status.textContent = "Neočekávaná chyba: " + err.message;
        console.error(err);
      }
    }

    load();
  </script>

</body>
</html>
