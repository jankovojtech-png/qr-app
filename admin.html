<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – odpovědi</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f6f8;
      padding:40px;
      margin:0;
    }
    h1{
      margin:0;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }
    .topbar-left{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
    .nav-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .btn{
      display:inline-block;
      padding:10px 14px;
      border:none;
      border-radius:6px;
      background:#2d7ef7;
      color:white;
      text-decoration:none;
      cursor:pointer;
      font-size:14px;
    }
    .btn.secondary{
      background:#111827;
    }
    .btn.light{
      background:#e5e7eb;
      color:#111827;
    }
    .userbox{
      background:white;
      padding:12px 16px;
      border-radius:8px;
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
    .stats{
      display:grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap:16px;
      margin-bottom:20px;
    }
    .card{
      background:white;
      padding:16px;
      border-radius:8px;
    }
    .card-title{
      font-size:14px;
      color:#666;
      margin-bottom:8px;
    }
    .card-value{
      font-size:28px;
      font-weight:bold;
    }
    .box{
      background:white;
      padding:16px;
      margin-bottom:20px;
      border-radius:8px;
    }
    .versions-box{
      background:white;
      padding:16px;
      margin-bottom:20px;
      border-radius:8px;
    }
    .versions-title{
      font-weight:bold;
      margin-bottom:12px;
      font-size:18px;
    }
    .versions-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));
      gap:12px;
    }
    .version-card{
      background:#f9fafb;
      border:1px solid #e5e7eb;
      border-radius:8px;
      padding:14px;
    }
    .version-card.active{
      border-color:#93c5fd;
      background:#eff6ff;
    }
    .version-title{
      font-weight:bold;
      margin-bottom:8px;
    }
    .version-meta{
      font-size:14px;
      color:#555;
      margin-bottom:6px;
    }
    .badge{
      display:inline-block;
      padding:5px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:bold;
      margin-bottom:8px;
    }
    .badge.active{
      background:#dbeafe;
      color:#1d4ed8;
    }
    .badge.inactive{
      background:#e5e7eb;
      color:#374151;
    }
    table{
      border-collapse:collapse;
      width:100%;
      background:white;
    }
    th,td{
      padding:10px;
      border-bottom:1px solid #ddd;
      text-align:left;
      vertical-align:top;
    }
    th{
      background:#f0f0f0;
    }
    tr:hover{
      background:#fafafa;
    }

    @media (max-width: 768px){
      body{
        padding:20px;
      }
      .stats{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body style="display:none;">

  <div class="topbar">
    <div class="topbar-left">
      <h1 id="pageTitle">Odpovědi z formulářů</h1>

      <div class="nav-actions">
        <a class="btn light" href="/my-qr.html">Moje QR</a>
        <a class="btn" href="/create-qr.html">Vytvořit QR</a>
      </div>
    </div>

    <div class="userbox">
      <span id="userEmail">Načítám uživatele...</span>
      <button id="logoutBtn" class="btn secondary">Odhlásit se</button>
    </div>
  </div>

  <div class="stats">
    <div class="card">
      <div class="card-title">Počet odpovědí</div>
      <div class="card-value" id="totalCount">0</div>
    </div>

    <div class="card">
      <div class="card-title">Průměr hodnocení</div>
      <div class="card-value" id="avgRating">0</div>
    </div>

    <div class="card">
      <div class="card-title">Počet QR kódů</div>
      <div class="card-value" id="codeCount">0</div>
    </div>
  </div>

  <div class="box" id="status">Ověřuji přihlášení...</div>

  <div id="versionsSection" class="versions-box" style="display:none;">
    <div class="versions-title">Verze tohoto QR</div>
    <div id="versionsGrid" class="versions-grid"></div>
  </div>

  <table>
    <thead>
      <tr>
        <th>QR kód</th>
        <th>Verze</th>
        <th>Jméno / odpověď</th>
        <th>Hodnocení</th>
        <th>Poznámka / obsah</th>
        <th>Čas</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <script>
    const SUPABASE_URL = "https://lpawgvdrzpbxozctfzxd.supabase.co";
    const SUPABASE_KEY = "sb_publishable_XaWFZ5tXOrwtY43Jb7wh6g_LO76lCQZ";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function formatDate(value) {
      if (!value) return "";
      const d = new Date(value);
      if (isNaN(d.getTime())) return value;
      return d.toLocaleString("cs-CZ");
    }

    function escapeHtml(value) {
      if (value === null || value === undefined) return "";
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function requireAuth() {
      const { data, error } = await client.auth.getUser();

      if (error || !data?.user) {
        window.location.href = "/login.html";
        return null;
      }

      return data.user;
    }

    async function loadAdminData(user) {
      const status = document.getElementById("status");
      const tbody = document.getElementById("tbody");
      const totalCountEl = document.getElementById("totalCount");
      const avgRatingEl = document.getElementById("avgRating");
      const codeCountEl = document.getElementById("codeCount");
      const userEmailEl = document.getElementById("userEmail");
      const pageTitle = document.getElementById("pageTitle");
      const versionsSection = document.getElementById("versionsSection");
      const versionsGrid = document.getElementById("versionsGrid");

      userEmailEl.textContent = user.email ? "Přihlášen: " + user.email : "Přihlášený uživatel";
      tbody.innerHTML = "";
      versionsGrid.innerHTML = "";
      versionsSection.style.display = "none";

      try {
        status.textContent = "Načítám data...";

        const params = new URLSearchParams(window.location.search);
        const selectedCode = params.get("code");

        const { data: myCodes, error: myCodesError } = await client
          .from("codes")
          .select("id, title")
          .eq("owner_id", user.id)
          .order("created_at", { ascending: false });

        if (myCodesError) {
          status.textContent = "Chyba načtení vašich QR kódů: " + myCodesError.message;
          console.error(myCodesError);
          return;
        }

        if (!myCodes || myCodes.length === 0) {
          pageTitle.textContent = "Odpovědi z formulářů";
          status.innerHTML = 'Zatím nemáte žádný QR kód. <a href="/create-qr.html">Vytvořit první QR</a>';
          totalCountEl.textContent = "0";
          avgRatingEl.textContent = "0";
          codeCountEl.textContent = "0";
          return;
        }

        const myCodeIds = myCodes.map(code => code.id);
        const codeTitleMap = {};
        myCodes.forEach(code => {
          codeTitleMap[code.id] = code.title || code.id;
        });

        if (selectedCode) {
          if (!myCodeIds.includes(selectedCode)) {
            pageTitle.textContent = "Detail QR";
            status.textContent = "Tento QR kód nepatří přihlášenému uživateli nebo neexistuje.";
            totalCountEl.textContent = "0";
            avgRatingEl.textContent = "0";
            codeCountEl.textContent = "0";
            return;
          }

          pageTitle.textContent = "Odpovědi pro QR: " + (codeTitleMap[selectedCode] || selectedCode);
        } else {
          pageTitle.textContent = "Odpovědi z formulářů";
        }

        let versionMap = {};
        let versionsForSelectedCode = [];

        if (selectedCode) {
          const { data: versionsData, error: versionsError } = await client
            .from("code_versions")
            .select("*")
            .eq("code_id", selectedCode)
            .order("version_number", { ascending: false });

          if (versionsError) {
            console.error(versionsError);
          } else {
            versionsForSelectedCode = versionsData || [];

            versionsForSelectedCode.forEach(version => {
              versionMap[version.id] = version;
            });
          }
        } else {
          const { data: versionsData, error: versionsError } = await client
            .from("code_versions")
            .select("id, code_id, version_number, title, is_active")
            .in("code_id", myCodeIds);

          if (versionsError) {
            console.error(versionsError);
          } else {
            (versionsData || []).forEach(version => {
              versionMap[version.id] = version;
            });
          }
        }

        let responsesQuery = client
          .from("responses")
          .select("*")
          .order("created_at", { ascending: false });

        if (selectedCode) {
          responsesQuery = responsesQuery.eq("code_id", selectedCode);
        } else {
          responsesQuery = responsesQuery.in("code_id", myCodeIds);
        }

        const { data, error } = await responsesQuery;

        if (error) {
          status.textContent = "Chyba načtení: " + error.message;
          console.error(error);
          return;
        }

        if (selectedCode && versionsForSelectedCode.length > 0) {
          versionsSection.style.display = "block";

          const versionCounts = {};
          (data || []).forEach(r => {
            const key = r.code_version_id || "unknown";
            versionCounts[key] = (versionCounts[key] || 0) + 1;
          });

          versionsForSelectedCode.forEach(version => {
            const card = document.createElement("div");
            card.className = "version-card" + (version.is_active ? " active" : "");

            card.innerHTML = `
              <div class="badge ${version.is_active ? "active" : "inactive"}">
                ${version.is_active ? "Aktivní verze" : "Historická verze"}
              </div>
              <div class="version-title">
                Verze ${escapeHtml(version.version_number)}${version.title ? " – " + escapeHtml(version.title) : ""}
              </div>
              <div class="version-meta"><strong>Odpovědí:</strong> ${versionCounts[version.id] || 0}</div>
              <div class="version-meta"><strong>Vytvořeno:</strong> ${escapeHtml(formatDate(version.created_at))}</div>
            `;

            versionsGrid.appendChild(card);
          });
        }

        if (!data || data.length === 0) {
          status.textContent = selectedCode
            ? "Pro tento QR zatím nejsou žádné odpovědi."
            : "Zatím nejsou žádné odpovědi k vašim QR kódům.";
          totalCountEl.textContent = "0";
          avgRatingEl.textContent = "0";
          codeCountEl.textContent = selectedCode ? "1" : String(myCodeIds.length);
          return;
        }

        status.textContent = selectedCode
          ? "Načteno odpovědí pro QR " + selectedCode + ": " + data.length
          : "Načteno odpovědí: " + data.length;

        totalCountEl.textContent = data.length;

        const uniqueCodes = new Set();
        const ratings = [];

        data.forEach((r) => {
          const answers = r.answers || {};
          uniqueCodes.add(r.code_id || "");

          const ratingNumber = Number(answers.rating);
          if (!isNaN(ratingNumber) && answers.rating !== "" && answers.rating != null) {
            ratings.push(ratingNumber);
          }

          const versionInfo = r.code_version_id && versionMap[r.code_version_id]
            ? versionMap[r.code_version_id]
            : null;

          const versionLabel = versionInfo
            ? "v" + versionInfo.version_number + (versionInfo.is_active ? " (aktivní)" : "")
            : (r.code_version_id ? "Neznámá verze" : "Původní data");

          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${escapeHtml(codeTitleMap[r.code_id] || r.code_id || "")}</td>
            <td>${escapeHtml(versionLabel)}</td>
            <td>${escapeHtml(answers.name || answers.answer || "")}</td>
            <td>${escapeHtml(answers.rating || "")}</td>
            <td>${escapeHtml(answers.note || answers.answer || answers.info || "")}</td>
            <td>${escapeHtml(formatDate(r.created_at))}</td>
          `;
          tbody.appendChild(row);
        });

        codeCountEl.textContent = selectedCode ? "1" : String(uniqueCodes.size);

        if (ratings.length > 0) {
          const sum = ratings.reduce((a, b) => a + b, 0);
          const avg = sum / ratings.length;
          avgRatingEl.textContent = avg.toFixed(1);
        } else {
          avgRatingEl.textContent = "0";
        }

      } catch (err) {
        status.textContent = "Neočekávaná chyba: " + err.message;
        console.error(err);
      }
    }

    async function initPage() {
      const user = await requireAuth();
      if (!user) return;

      document.body.style.display = "block";

      await loadAdminData(user);
    }

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await client.auth.signOut();
      window.location.href = "/login.html";
    });

    initPage();
  </script>

</body>
</html>
