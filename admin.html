<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<link rel="stylesheet" href="/css/app.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="auth-guard">

<header class="topbar">
<div class="topbar-inner">

<div class="brand">QR App Admin</div>

<nav class="nav">
<a href="/admin.html" class="active">Odpovědi</a>
<a href="/my-qr.html">Moje QR</a>
<a href="/create-qr.html">Vytvořit QR</a>
<a href="/generator.html">Generátor</a>
<button id="logoutBtn">Odhlásit</button>
</nav>

</div>
</header>

<main class="page page-wide">

<h1>Odpovědi z formulářů</h1>

<p class="lead">Přehled odpovědí z QR formulářů.</p>

<div id="status" class="box">Načítám...</div>

<div class="table-wrap">

<table>

<thead>
<tr>
<th>Název QR</th>
<th>Kód</th>
<th>Verze</th>
<th>Jméno</th>
<th>Hodnocení</th>
<th>Poznámka</th>
<th>Čas</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</main>

<script type="module">

import { client } from "/js/supabase.js";
import { requireAuth , logout } from "/js/auth.js";
import { $, formatDate } from "/js/helpers.js";

const tbody = $("#tbody");
const status = $("#status");

async function load(){

const user = await requireAuth();
if(!user) return;

document.body.style.display = "block";

const { data , error } = await client
.from("responses")
.select("*")
.order("created_at",{ascending:false});

if(error){
status.textContent = error.message;
return;
}

status.textContent = "Načteno odpovědí: "+data.length;

data.forEach(r=>{

const tr = document.createElement("tr");

const a = r.answers || {};

tr.innerHTML = `
<td>${r.code_id}</td>
<td>${r.code_id}</td>
<td>v1</td>
<td>${a.name || ""}</td>
<td>${a.rating || ""}</td>
<td>${a.note || ""}</td>
<td>${formatDate(r.created_at)}</td>
`;

tbody.appendChild(tr);

});

}

$("#logoutBtn").addEventListener("click",logout);

load();

</script>

</body>
</html>
