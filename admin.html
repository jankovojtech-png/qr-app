<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – odpovědi</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f6f8;
      padding:40px;
      margin:0;
    }
    h1{
      margin-bottom:20px;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }
    .userbox{
      background:white;
      padding:12px 16px;
      border-radius:8px;
      display:flex;
      align-items:center;
      gap:12px;
    }
    .logout-btn{
      background:#111827;
      color:white;
      border:none;
      border-radius:6px;
      padding:10px 14px;
      cursor:pointer;
      font-size:14px;
    }
    .logout-btn:hover{
      opacity:0.92;
    }
    .stats{
      display:grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap:16px;
      margin-bottom:20px;
    }
    .card{
      background:white;
      padding:16px;
      border-radius:8px;
    }
    .card-title{
      font-size:14px;
      color:#666;
      margin-bottom:8px;
    }
    .card-value{
      font-size:28px;
      font-weight:bold;
    }
    .box{
      background:white;
      padding:16px;
      margin-bottom:20px;
      border-radius:8px;
    }
    table{
      border-collapse:collapse;
      width:100%;
      background:white;
    }
    th,td{
      padding:10px;
      border-bottom:1px solid #ddd;
      text-align:left;
      vertical-align:top;
    }
    th{
      background:#f0f0f0;
    }
    tr:hover{
      background:#fafafa;
    }

    @media (max-width: 768px){
      body{
        padding:20px;
      }
      .stats{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <h1>Odpovědi z formulářů</h1>

    <div class="userbox">
      <span id="userEmail">Načítám uživatele...</span>
      <button id="logoutBtn" class="logout-btn">Odhlásit se</button>
    </div>
  </div>

  <div class="stats">
    <div class="card">
      <div class="card-title">Počet odpovědí</div>
      <div class="card-value" id="totalCount">0</div>
    </div>

    <div class="card">
      <div class="card-title">Průměr hodnocení</div>
      <div class="card-value" id="avgRating">0</div>
    </div>

    <div class="card">
      <div class="card-title">Počet QR kódů</div>
      <div class="card-value" id="codeCount">0</div>
    </div>
  </div>

  <div class="box" id="status">Ověřuji přihlášení...</div>

  <table>
    <thead>
      <tr>
        <th>QR kód</th>
        <th>Jméno</th>
        <th>Hodnocení</th>
        <th>Poznámka</th>
        <th>Čas</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <script>
    const SUPABASE_URL = "https://lpawgvdrzpbxozctfzxd.supabase.co";
    const SUPABASE_KEY = "sb_publishable_XaWFZ5tXOrwtY43Jb7wh6g_LO76lCQZ";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function formatDate(value) {
      if (!value) return "";
      const d = new Date(value);
      if (isNaN(d.getTime())) return value;
      return d.toLocaleString("cs-CZ");
    }

    async function requireAuth() {
      const { data, error } = await client.auth.getUser();

      if (error || !data?.user) {
        window.location.href = "/login.html";
        return null;
      }

      return data.user;
    }

    async function loadAdminData(user) {
      const status = document.getElementById("status");
      const tbody = document.getElementById("tbody");
      const totalCountEl = document.getElementById("totalCount");
      const avgRatingEl = document.getElementById("avgRating");
      const codeCountEl = document.getElementById("codeCount");
      const userEmailEl = document.getElementById("userEmail");

      userEmailEl.textContent = user.email ? "Přihlášen: " + user.email : "Přihlášený uživatel";
      tbody.innerHTML = "";

      try {
        status.textContent = "Načítám data...";

        const { data, error } = await client
          .from("responses")
          .select("*")
          .order("created_at", { ascending: false });

        if (error) {
          status.textContent = "Chyba načtení: " + error.message;
          console.error(error);
          return;
        }

        if (!data || data.length === 0) {
          status.textContent = "Zatím žádné odpovědi.";
          totalCountEl.textContent = "0";
          avgRatingEl.textContent = "0";
          codeCountEl.textContent = "0";
          return;
        }

        status.textContent = "Načteno odpovědí: " + data.length;
        totalCountEl.textContent = data.length;

        const uniqueCodes = new Set();
        const ratings = [];

        data.forEach((r) => {
          const answers = r.answers || {};
          uniqueCodes.add(r.code_id || "");

          const ratingNumber = Number(answers.rating);
          if (!isNaN(ratingNumber) && answers.rating !== "" && answers.rating != null) {
            ratings.push(ratingNumber);
          }

          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${r.code_id || ""}</td>
            <td>${answers.name || ""}</td>
            <td>${answers.rating || ""}</td>
            <td>${answers.note || ""}</td>
            <td>${formatDate(r.created_at)}</td>
          `;
          tbody.appendChild(row);
        });

        codeCountEl.textContent = uniqueCodes.size;

        if (ratings.length > 0) {
          const sum = ratings.reduce((a, b) => a + b, 0);
          const avg = sum / ratings.length;
          avgRatingEl.textContent = avg.toFixed(1);
        } else {
          avgRatingEl.textContent = "0";
        }

      } catch (err) {
        status.textContent = "Neočekávaná chyba: " + err.message;
        console.error(err);
      }
    }

    async function initPage() {
      const user = await requireAuth();
      if (!user) return;

      console.log("Přihlášený user:", user);
      console.log("User ID:", user.id);

      await loadAdminData(user);
    }

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await client.auth.signOut();
      window.location.href = "/login.html";
    });

    initPage();
  </script>

</body>
</html>
