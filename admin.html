<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin – odpovědi</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}

h1{
margin-bottom:20px;
}

table{
border-collapse:collapse;
width:100%;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#f0f0f0;
}

tr:hover{
background:#fafafa;
}
</style>

</head>

<body>

<h1>Odpovědi z formulářů</h1>

<table id="table">
<thead>
<tr>
<th>QR kód</th>
<th>Jméno</th>
<th>Hodnocení</th>
<th>Poznámka</th>
<th>Čas</th>
</tr>
</thead>

<tbody></tbody>
</table>

<script>

const SUPABASE_URL="https://lpawgvdzrpboxzctfzxd.supabase.co";
const SUPABASE_KEY="sb_publishable_XaWFZ5tXOrwtY43Jb7wh6g_LO76lCQZ";

const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

async function load(){

const {data}=await client
.from("responses")
.select("*")
.order("created_at",{ascending:false});

const tbody=document.querySelector("tbody");

data.forEach(r=>{

const answers=r.answers;

const row=document.createElement("tr");

row.innerHTML=`
<td>${r.code_id}</td>
<td>${answers.name||""}</td>
<td>${answers.rating||""}</td>
<td>${answers.note||""}</td>
<td>${r.created_at||""}</td>
`;

tbody.appendChild(row);

});

}

load();

</script>

</body>
</html>
