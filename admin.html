<script>
const SUPABASE_URL = "https://lpawgvdrzpbxozctfzxd.supabase.co";
const SUPABASE_KEY = "sb_publishable_XaWFZ5tXOrwtY43Jb7wh6g_LO76lCQZ";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function load() {
  const tbody = document.querySelector("tbody");
  tbody.innerHTML = "";

  const { data, error } = await client
    .from("responses")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.error("Supabase error:", error);
    tbody.innerHTML = `
      <tr>
        <td colspan="5">Chyba načtení: ${error.message}</td>
      </tr>
    `;
    return;
  }

  if (!data || data.length === 0) {
    tbody.innerHTML = `
      <tr>
        <td colspan="5">Zatím žádné odpovědi</td>
      </tr>
    `;
    return;
  }

  data.forEach((r) => {
    const answers = r.answers || {};

    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${r.code_id || ""}</td>
      <td>${answers.name || ""}</td>
      <td>${answers.rating || ""}</td>
      <td>${answers.note || ""}</td>
      <td>${r.created_at || ""}</td>
    `;
    tbody.appendChild(row);
  });
}

load();
</script>
