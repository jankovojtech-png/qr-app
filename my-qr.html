<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moje QR</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    body{
      font-family:Arial,sans-serif;
      background:#f4f6f8;
      margin:0;
      padding:30px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:24px;
    }

    .topbar-left{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    h1{
      margin:0;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-block;
      padding:10px 14px;
      border:none;
      border-radius:6px;
      background:#2d7ef7;
      color:white;
      text-decoration:none;
      cursor:pointer;
      font-size:14px;
    }

    .btn.secondary{
      background:#111827;
    }

    .btn.light{
      background:#e5e7eb;
      color:#111827;
    }

    .btn.warning{
      background:#b45309;
      color:white;
    }

    .btn.danger{
      background:#b91c1c;
      color:white;
    }

    .status{
      background:white;
      padding:14px 16px;
      border-radius:8px;
      margin-bottom:20px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(340px, 1fr));
      gap:18px;
    }

    .card{
      background:white;
      border-radius:10px;
      padding:18px;
      box-shadow:0 4px 20px rgba(0,0,0,0.06);
      border:2px solid transparent;
    }

    .card.inactive{
      border-color:#f59e0b;
      opacity:0.95;
    }

    .card h2{
      margin-top:0;
      margin-bottom:10px;
      font-size:20px;
    }

    .meta{
      font-size:14px;
      color:#555;
      margin-bottom:8px;
      word-break:break-word;
    }

    .meta strong{
      color:#111;
    }

    .badge{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:bold;
      margin-bottom:10px;
    }

    .badge.active{
      background:#dcfce7;
      color:#166534;
    }

    .badge.inactive{
      background:#fef3c7;
      color:#92400e;
    }

    .qr-wrap{
      text-align:center;
      margin:18px 0;
    }

    .link{
      word-break:break-all;
      font-size:13px;
      color:#444;
      background:#f9fafb;
      padding:10px;
      border-radius:6px;
      margin-bottom:14px;
    }

    .card-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .empty{
      background:white;
      padding:24px;
      border-radius:10px;
    }

    @media (max-width: 768px){
      body{
        padding:18px;
      }
    }
  </style>
</head>
<body style="display:none;">

  <div class="topbar">
    <div class="topbar-left">
      <h1>Moje QR kódy</h1>
      <div class="actions">
        <a class="btn light" href="/admin.html">Dashboard</a>
        <a class="btn" href="/create-qr.html">+ Vytvořit QR</a>
      </div>
    </div>

    <div class="actions">
      <button id="logoutBtn" class="btn secondary">Odhlásit se</button>
    </div>
  </div>

  <div id="status" class="status">Ověřuji přihlášení...</div>

  <div id="list" class="grid"></div>

  <script>
    const SUPABASE_URL = "https://lpawgvdrzpbxozctfzxd.supabase.co";
    const SUPABASE_KEY = "sb_publishable_XaWFZ5tXOrwtY43Jb7wh6g_LO76lCQZ";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;

    function formatDate(value) {
      if (!value) return "";
      const d = new Date(value);
      if (isNaN(d.getTime())) return value;
      return d.toLocaleString("cs-CZ");
    }

    function escapeHtml(value) {
      if (value === null || value === undefined) return "";
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function requireAuth() {
      const { data, error } = await client.auth.getUser();

      if (error || !data?.user) {
        window.location.href = "/login.html";
        return null;
      }

      return data.user;
    }

    async function toggleQrActive(codeId, currentActive) {
      const actionText = currentActive ? "deaktivovat" : "aktivovat";
      const confirmed = confirm(`Opravdu chcete ${actionText} tento QR kód?`);

      if (!confirmed) return;

      const { error } = await client
        .from("codes")
        .update({ active: !currentActive })
        .eq("id", codeId)
        .eq("owner_id", currentUser.id);

      if (error) {
        alert("Chyba při změně stavu QR: " + error.message);
        console.error(error);
        return;
      }

      await loadMyQr();
    }

    async function deleteQr(codeId) {
      const confirmed = confirm(
        "Opravdu chcete smazat tento QR kód?\n\nPozor: pokud existují odpovědi navázané na tento QR, mazání může selhat podle nastavení databáze."
      );

      if (!confirmed) return;

      const { error } = await client
        .from("codes")
        .delete()
        .eq("id", codeId)
        .eq("owner_id", currentUser.id);

      if (error) {
        alert("Chyba při mazání QR: " + error.message);
        console.error(error);
        return;
      }

      await loadMyQr();
    }

    async function loadMyQr() {
      const status = document.getElementById("status");
      const list = document.getElementById("list");

      status.textContent = "Načítám vaše QR kódy...";
      list.innerHTML = "";

      try {
        const { data: codes, error: codesError } = await client
          .from("codes")
          .select("*")
          .eq("owner_id", currentUser.id)
          .order("created_at", { ascending: false });

        if (codesError) {
          status.textContent = "Chyba načtení QR kódů: " + codesError.message;
          console.error(codesError);
          return;
        }

        if (!codes || codes.length === 0) {
          status.innerHTML = "Zatím nemáte žádný QR kód.";
          list.innerHTML = `
            <div class="empty">
              Ještě nebyl vytvořen žádný QR kód.<br><br>
              <a class="btn" href="/create-qr.html">Vytvořit první QR</a>
            </div>
          `;
          return;
        }

        status.textContent = "Načteno QR kódů: " + codes.length;

        const codeIds = codes.map(c => c.id);
        const responseCounts = {};

        if (codeIds.length > 0) {
          const { data: responses, error: responsesError } = await client
            .from("responses")
            .select("code_id")
            .in("code_id", codeIds);

          if (responsesError) {
            console.error(responsesError);
          } else {
            responses.forEach(r => {
              responseCounts[r.code_id] = (responseCounts[r.code_id] || 0) + 1;
            });
          }
        }

        for (const code of codes) {
          const publicUrl = window.location.origin + "/index.html?code=" + encodeURIComponent(code.id);
          const responseCount = responseCounts[code.id] || 0;
          const safeCodeId = encodeURIComponent(code.id);

          const card = document.createElement("div");
          card.className = "card" + (code.active === false ? " inactive" : "");

          card.innerHTML = `
            <div class="badge ${code.active === false ? "inactive" : "active"}">
              ${code.active === false ? "Neaktivní" : "Aktivní"}
            </div>

            <h2>${escapeHtml(code.title || "Bez názvu")}</h2>

            <div class="meta"><strong>Kód:</strong> ${escapeHtml(code.id)}</div>
            <div class="meta"><strong>Vytvořeno:</strong> ${escapeHtml(formatDate(code.created_at))}</div>
            <div class="meta"><strong>Počet odpovědí:</strong> ${responseCount}</div>

            <div class="link">
              <strong>Veřejný odkaz:</strong><br>
              ${escapeHtml(publicUrl)}
            </div>

            <div class="qr-wrap" id="qr-${safeCodeId}"></div>

            <div class="card-actions">
              <a class="btn" href="/admin.html?code=${safeCodeId}">Odpovědi</a>
              <a class="btn light" href="/edit-qr.html?code=${safeCodeId}">Upravit QR</a>
              <a class="btn light" href="${publicUrl}" target="_blank">Otevřít</a>
              <button class="btn warning" data-action="toggle" data-id="${escapeHtml(code.id)}" data-active="${code.active === false ? "false" : "true"}">
                ${code.active === false ? "Aktivovat" : "Deaktivovat"}
              </button>
              <button class="btn danger" data-action="delete" data-id="${escapeHtml(code.id)}">
                Smazat QR
              </button>
            </div>
          `;

          list.appendChild(card);

          const qrTarget = document.getElementById("qr-" + safeCodeId);
          const canvas = document.createElement("canvas");

          await QRCode.toCanvas(canvas, publicUrl, {
            width: 180,
            margin: 2
          });

          qrTarget.appendChild(canvas);
        }

        list.querySelectorAll('[data-action="toggle"]').forEach((btn) => {
          btn.addEventListener("click", async () => {
            const codeId = btn.getAttribute("data-id");
            const currentActive = btn.getAttribute("data-active") === "true";
            await toggleQrActive(codeId, currentActive);
          });
        });

        list.querySelectorAll('[data-action="delete"]').forEach((btn) => {
          btn.addEventListener("click", async () => {
            const codeId = btn.getAttribute("data-id");
            await deleteQr(codeId);
          });
        });

      } catch (err) {
        status.textContent = "Neočekávaná chyba: " + err.message;
        console.error(err);
      }
    }

    async function initPage() {
      currentUser = await requireAuth();
      if (!currentUser) return;

      document.body.style.display = "block";
      await loadMyQr();
    }

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await client.auth.signOut();
      window.location.href = "/login.html";
    });

    initPage();
  </script>
</body>
</html>
