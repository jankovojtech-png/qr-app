    let currentUser = null;

    async function toggleQrActive(codeId, currentActive) {
      const actionText = currentActive ? "deaktivovat" : "aktivovat";
      if (!confirm(`Opravdu chcete ${actionText} tento QR kód?`)) return;

      const { error } = await client
        .from("codes")
        .update({ active: !currentActive })
        .eq("id", codeId)
        .eq("owner_id", currentUser.id);

      if (error) return alert("Chyba při změně stavu QR: " + error.message);
      await loadMyQr();
    }

    async function deleteQr(codeId) {
      if (!confirm("Opravdu chcete smazat tento QR kód?\n\nPokud existují odpovědi nebo verze navázané na tento QR, mazání může selhat podle nastavení databáze.")) return;

      const { error } = await client.from("codes").delete().eq("id", codeId).eq("owner_id", currentUser.id);
      if (error) return alert("Chyba při mazání QR: " + error.message);
      await loadMyQr();
    }
