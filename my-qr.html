<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moje QR</title>

<link rel="stylesheet" href="/css/app.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="auth-guard">

<header class="topbar">
<div class="topbar-inner">

<div class="brand">QR App Admin</div>

<nav class="nav">
<a href="/admin.html">Odpovědi</a>
<a href="/my-qr.html" class="active">Moje QR</a>
<a href="/create-qr.html">Vytvořit QR</a>
<a href="/generator.html">Generátor</a>
<button id="logoutBtn">Odhlásit</button>
</nav>

</div>
</header>

<main class="page">

<h1>Moje QR kódy</h1>

<p class="lead">Seznam QR formulářů které jsi vytvořil.</p>

<div id="status" class="box">Načítám...</div>

<div id="list" class="qr-grid"></div>

</main>

<script type="module">

import { client } from "/js/supabase.js"
import { requireAuth , logout } from "/js/auth.js"
import { $ } from "/js/helpers.js"
import { renderQr } from "/js/qr.js"

const list = $("#list")
const status = $("#status")

async function load(){

const user = await requireAuth()
if(!user) return

document.body.style.display="block"

const { data , error } = await client
.from("codes")
.select("*")
.eq("owner_id",user.id)
.order("created_at",{ascending:false})

if(error){
status.textContent = error.message
return
}

status.textContent = "Počet QR: "+data.length

data.forEach(code=>{

const box = document.createElement("div")
box.className="qr-card"

const url = window.location.origin+"/index.html?code="+code.id

box.innerHTML=`
<h3>${code.title}</h3>
<div class="qr"></div>
<div class="muted">${code.id}</div>
<a class="btn primary" href="/edit-qr.html?code=${code.id}">Upravit</a>
`

list.appendChild(box)

renderQr(box.querySelector(".qr"),url)

})

}

$("#logoutBtn").addEventListener("click",logout)

load()

</script>

</body>
</html>
