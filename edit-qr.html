<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upravit QR</title>

  <link rel="stylesheet" href="/css/app.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="auth-guard">

  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">QR App Admin</div>

      <nav class="nav">
        <a href="/admin.html">Odpovědi</a>
        <a href="/my-qr.html">Moje QR</a>
        <a href="/create-qr.html">Vytvořit QR</a>
        <a href="/generator.html">Generátor</a>
        <button id="logoutBtn" type="button">Odhlásit</button>
      </nav>
    </div>
  </header>

  <main class="page">
    <h1>Upravit QR</h1>

    <div id="status" class="box">Načítám...</div>

    <div class="card" style="margin-top:20px;">
      <label for="title">Název</label>
      <input id="title" type="text">

      <label for="formType">Typ QR</label>
      <select id="formType">
        <option value="rating">Hodnocení</option>
        <option value="question">Otázka</option>
        <option value="info">Info</option>
      </select>

      <div id="questionFieldWrap">
        <label id="questionLabel" for="question">Text otázky pro hodnocení</label>
        <textarea id="question"></textarea>
      </div>

      <button id="saveBtn" class="btn primary" type="button">Uložit novou verzi</button>
    </div>

    <div class="card" style="margin-top:20px;">
      <h2 style="margin-top:0;">Historie verzí</h2>
      <div id="versions"></div>
    </div>
  </main>

  <script type="module">
    import { client } from "/js/supabase.js";
    import { requireAuth, logout } from "/js/auth.js";
    import { $, escapeHtml, formatDate } from "/js/helpers.js";

    const params = new URLSearchParams(location.search);
    const codeId = params.get("code");

    const statusEl = $("#status");
    const titleInput = $("#title");
    const formTypeInput = $("#formType");
    const questionInput = $("#question");
    const questionFieldWrap = $("#questionFieldWrap");
    const questionLabelEl = $("#questionLabel");
    const versionsEl = $("#versions");
    const saveBtn = $("#saveBtn");

    let currentUser = null;
    let currentCode = null;
    let versionsCache = [];
    let responseCounts = {};

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function detectTypeFromSchema(schema) {
      if (!Array.isArray(schema)) return "rating";
      if (schema.some(field => field && field.id === "info")) return "info";
      if (schema.some(field => field && field.id === "answer")) return "question";
      if (schema.some(field => field && field.id === "rating")) return "rating";
      return "rating";
    }

    function getQuestionLabelFromSchema(schema) {
      if (!Array.isArray(schema)) return "";

      const type = detectTypeFromSchema(schema);

      if (type === "rating") {
        const ratingField = schema.find(field => field && field.id === "rating");
        return ratingField?.label || "";
      }

      if (type === "question") {
        const answerField = schema.find(field => field && field.id === "answer");
        return answerField?.label || "";
      }

      if (type === "info") {
        const infoField = schema.find(field => field && field.id === "info");
        return infoField?.label || "";
      }

      return "";
    }

    function getTypeLabel(type) {
      if (type === "rating") return "Hodnocení";
      if (type === "question") return "Otázka";
      if (type === "info") return "Info";
      return type || "";
    }

    function updateFormVisibility() {
      const type = formTypeInput.value;

      if (type === "rating") {
        questionFieldWrap.style.display = "block";
        questionLabelEl.textContent = "Text otázky pro hodnocení";
        return;
      }

      if (type === "question") {
        questionFieldWrap.style.display = "block";
        questionLabelEl.textContent = "Text otázky";
        return;
      }

      if (type === "info") {
        questionFieldWrap.style.display = "block";
        questionLabelEl.textContent = "Text informace";
        return;
      }
    }

    function buildSchemaByType(type, questionText) {
      if (type === "question") {
        return [
          { id: "answer", type: "textarea", label: questionText || "Vaše odpověď" }
        ];
      }

      if (type === "info") {
        return [
          { id: "info", type: "textarea", label: questionText || "Informace" }
        ];
      }

      return [
        { id: "name", type: "text", label: "Jméno" },
        { id: "rating", type: "rating", label: questionText || "Hodnocení" },
        { id: "note", type: "textarea", label: "Poznámka" }
      ];
    }

    async function loadCode() {
      const { data, error } = await client
        .from("codes")
        .select("*")
        .eq("id", codeId)
        .eq("owner_id", currentUser.id)
        .single();

      if (error || !data) {
        throw new Error("QR kód nebyl nalezen nebo k němu nemáš přístup.");
      }

      currentCode = data;
    }

    async function loadVersions() {
      const { data, error } = await client
        .from("code_versions")
        .select("id, code_id, version_number, title, schema, is_active, created_at")
        .eq("code_id", codeId)
        .order("created_at", { ascending: false });

      if (error) {
        throw new Error("Nepodařilo se načíst verze: " + error.message);
      }

      versionsCache = data || [];
    }

    async function loadResponseCounts() {
      const { data, error } = await client
        .from("responses")
        .select("id, code_version_id")
        .eq("code_id", codeId);

      if (error) {
        throw new Error("Nepodařilo se načíst odpovědi: " + error.message);
      }

      responseCounts = {};

      (data || []).forEach(row => {
        const versionId = row.code_version_id;
        responseCounts[versionId] = (responseCounts[versionId] || 0) + 1;
      });
    }

    function renderVersions() {
      versionsEl.innerHTML = "";

      if (!versionsCache.length) {
        versionsEl.innerHTML = "<div class='muted'>Zatím neexistuje žádná verze.</div>";
        return;
      }

      versionsCache.forEach(version => {
        const answersCount = responseCounts[version.id] || 0;
        const canDelete = version.is_active !== true && answersCount === 0;
        const versionType = detectTypeFromSchema(version.schema);
        const questionLabel = getQuestionLabelFromSchema(version.schema);

        const box = document.createElement("div");
        box.className = "box";
        box.style.marginBottom = "12px";

        box.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;">
            <div>
              <div><strong>Verze:</strong> ${escapeHtml(String(version.version_number || ""))}</div>
              <div><strong>Název:</strong> ${escapeHtml(version.title || "")}</div>
              <div><strong>Typ:</strong> ${escapeHtml(getTypeLabel(versionType))}</div>
              <div><strong>Obsah:</strong> ${escapeHtml(questionLabel || "")}</div>
              <div><strong>Aktivní:</strong> ${version.is_active ? "Ano" : "Ne"}</div>
              <div><strong>Odpovědí:</strong> ${answersCount}</div>
              <div><strong>Vytvořeno:</strong> ${escapeHtml(formatDate(version.created_at))}</div>
            </div>
            <div>
              ${
                canDelete
                  ? `<button class="btn danger delete-version-btn" type="button" data-version-id="${version.id}">Smazat</button>`
                  : `<span class="muted">Smazání není povoleno</span>`
              }
            </div>
          </div>
        `;

        versionsEl.appendChild(box);
      });

      versionsEl.querySelectorAll(".delete-version-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
          const versionId = btn.dataset.versionId;
          await deleteVersion(versionId);
        });
      });
    }

    async function deleteVersion(versionId) {
      const version = versionsCache.find(v => String(v.id) === String(versionId));

      if (!version) {
        alert("Verze nebyla nalezena.");
        return;
      }

      const answersCount = responseCounts[version.id] || 0;

      if (version.is_active === true) {
        alert("Aktivní verzi nelze smazat.");
        return;
      }

      if (answersCount > 0) {
        alert("Verzi s odpověďmi nelze smazat.");
        return;
      }

      const confirmed = confirm("Opravdu chceš tuto historickou verzi smazat?");
      if (!confirmed) return;

      const { error } = await client
        .from("code_versions")
        .delete()
        .eq("id", version.id)
        .eq("code_id", codeId);

      if (error) {
        alert("Chyba při mazání: " + error.message);
        return;
      }

      setStatus("Verze byla smazána.");
      await refreshPageData();
    }

    async function save() {
      const title = titleInput.value.trim();
      const type = formTypeInput.value;
      const question = questionInput.value.trim();

      if (!title) {
        alert("Vyplň název.");
        return;
      }

      if (!question) {
        if (type === "rating") {
          alert("Vyplň text otázky pro hodnocení.");
          return;
        }

        if (type === "question") {
          alert("Vyplň text otázky.");
          return;
        }

        if (type === "info") {
          alert("Vyplň text informace.");
          return;
        }
      }

      const schema = buildSchemaByType(type, question);

      const nextVersionNumber = versionsCache.length
        ? Math.max(...versionsCache.map(v => Number(v.version_number) || 0)) + 1
        : 1;

      saveBtn.disabled = true;

      try {
        const { error: deactivateError } = await client
          .from("code_versions")
          .update({ is_active: false })
          .eq("code_id", codeId);

        if (deactivateError) {
          throw new Error("Nepodařilo se deaktivovat staré verze: " + deactivateError.message);
        }

        const { error: insertError } = await client
          .from("code_versions")
          .insert({
            code_id: codeId,
            version_number: nextVersionNumber,
            title,
            schema,
            is_active: true
          });

        if (insertError) {
          throw new Error("Nepodařilo se uložit novou verzi: " + insertError.message);
        }

        const { error: updateCodeError } = await client
          .from("codes")
          .update({ title })
          .eq("id", codeId)
          .eq("owner_id", currentUser.id);

        if (updateCodeError) {
          throw new Error("Nepodařilo se aktualizovat název QR: " + updateCodeError.message);
        }

        setStatus("Nová verze byla uložena.");
        await refreshPageData();
      } catch (err) {
        alert(err.message || "Chyba při ukládání.");
      } finally {
        saveBtn.disabled = false;
      }
    }

    async function refreshPageData() {
      await loadCode();
      await loadVersions();
      await loadResponseCounts();

      const activeVersion = versionsCache.find(v => v.is_active === true) || versionsCache[0] || null;
      const activeType = detectTypeFromSchema(activeVersion?.schema);

      titleInput.value = activeVersion?.title || currentCode?.title || "";
      formTypeInput.value = activeType;
      questionInput.value = getQuestionLabelFromSchema(activeVersion?.schema) || "";

      updateFormVisibility();
      renderVersions();

      setStatus(`Načteno verzí: ${versionsCache.length}`);
    }

    async function init() {
      if (!codeId) {
        setStatus("Chybí parametr code v URL.");
        return;
      }

      currentUser = await requireAuth();
      if (!currentUser) return;

      document.body.style.display = "block";

      try {
        await refreshPageData();
      } catch (err) {
        setStatus(err.message || "Chyba při načítání.");
      }
    }

    $("#saveBtn").addEventListener("click", save);
    $("#logoutBtn").addEventListener("click", logout);
    $("#formType").addEventListener("change", updateFormVisibility);

    init();
  </script>

</body>
</html>
