<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit QR</title>

<link rel="stylesheet" href="/css/app.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="auth-guard">

<header class="topbar">
<div class="topbar-inner">

<div class="brand">QR App Admin</div>

<nav class="nav">
<a href="/admin.html">Odpovědi</a>
<a href="/my-qr.html">Moje QR</a>
<a href="/create-qr.html">Vytvořit QR</a>
<a href="/generator.html">Generátor</a>
<button id="logoutBtn">Odhlásit</button>
</nav>

</div>
</header>

<main class="page">

<h1>Upravit QR</h1>

<div class="card">

<label>Název</label>
<input id="title">

<label>Otázka</label>
<textarea id="question"></textarea>

<button id="saveBtn" class="btn primary">Uložit novou verzi</button>

</div>

</main>

<script type="module">

import { client } from "/js/supabase.js"
import { requireAuth , logout } from "/js/auth.js"
import { $ } from "/js/helpers.js"

const params=new URLSearchParams(location.search)
const codeId=params.get("code")

async function save(){

const title=$("#title").value
const question=$("#question").value

const schema=[
{ id:"name",type:"text",label:"Jméno"},
{ id:"rating",type:"number",label:question},
{ id:"note",type:"textarea",label:"Poznámka"}
]

await client.from("code_versions").insert({
code_id:codeId,
version_number:Date.now(),
title,
schema,
is_active:true
})

alert("Uloženo")

}

$("#saveBtn").addEventListener("click",save)
$("#logoutBtn").addEventListener("click",logout)

</script>

</body>
</html>
